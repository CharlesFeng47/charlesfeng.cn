name: Deploy Blog
run-name: ${{ github.actor }} is deploying via GitHub Actions 🚀
on:
  push:
    branches:
      - 'main'
      - 'master'
jobs:
  Deploy-Blog:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
      - name: Resolve yarn cert issue
        run: yarn config set strict-ssl false
      - name: Install dependencies
        run: yarn install
      - name: Yarn Lock file
        run: cat yarn.lock
      - name: Build blog
        run: yarn build
      - name: Prepare remote dir
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DeployHost }}
          username: azureuser
          key: ${{ secrets.DeployKey }}
          script: mkdir -p ~/blog/charlesfeng
      - name: Deploy blog to server
        id: deploy
        uses: Pendect/action-rsyncer@v2.0.0
        env:
          DEPLOY_KEY: ${{secrets.DeployKey}}
        with:
          flags: '-avzr --delete-after'
          options: ''
          ssh_options: ''
          src: 'public/'
          dest: ${{ format('azureuser@{0}:~/blog/charlesfeng/public/', secrets.DeployHost) }}
      - name: Display status from deploy
        run: echo "${{ steps.deploy.outputs.status }}"
      - name: Deploy error page to server
        id: deploy2
        uses: Pendect/action-rsyncer@v2.0.0
        env:
          DEPLOY_KEY: ${{secrets.DeployKey}}
        with:
          flags: '-avzr --delete-after'
          options: ''
          ssh_options: ''
          src: 'defaulterror/'
          dest: ${{ format('azureuser@{0}:~/blog/charlesfeng/defaulterror/', secrets.DeployHost) }}
      - name: Display status from deploy error page
        run: echo "${{ steps.deploy2.outputs.status }}"
      - name: Fix permissions on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DeployHost }}
          username: azureuser
          key: ${{ secrets.DeployKey }}
          script: |
            namei -l /home/azureuser/blog/charlesfeng/public/index.html
            sudo chmod o+x /home
            sudo chmod o+x /home/azureuser
            sudo chmod -R o+rx /home/azureuser/blog